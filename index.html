<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso de Conta - Inter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ícone de erro circular */
        .error-icon {
            width: 80px;
            height: 80px;
            background-color: #f2745f; /* Vermelho suave da imagem */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .error-icon::before {
            content: '✕';
            color: white;
            font-size: 30px;
            font-weight: bold;
            border: 2px solid white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 15px;
            font-weight: 700;
            line-height: 1.2;
        }

        p {
            font-size: 16px;
            color: #4d4d4d;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        strong {
            color: #000;
        }

        /* Botão Laranja */
        .btn-entendi {
            background-color: #f57c00; /* Laranja Inter */
            color: white;
            border: none;
            border-radius: 8px;
            padding: 16px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            position: absolute;
            bottom: 40px;
            max-width: 90%;
        }

        .btn-entendi:active {
            background-color: #e67300;
        }

        /* Ajuste para telas menores */
        @media (max-width: 480px) {
            h1 { font-size: 24px; }
            .btn-entendi { width: calc(100% - 40px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="error-icon"></div>
        
        <h1>Sua conta foi negada há menos de 180 dias</h1>
        
        <p>Você poderá solicitar uma nova abertura de conta a partir de <strong>2/03/2027</strong>.</p>
    </div>

    <button class="btn-entendi">Entendi</button>

</body>
</html>
